name: Elmer Smoke

on:
  pull_request:
    branches: [main]
    paths:
      - "orchestrator/**"
      - ".github/workflows/elmer-smoke.yml"
      - ".github/workflows/elmer-preview-gate.yml"
      - ".github/workflows/elmer-prod-smoke.yml"
  workflow_call:
    inputs:
      base_url:
        required: false
        type: string
      suite:
        required: false
        type: string
  workflow_dispatch:
    inputs:
      base_url:
        description: "Optional deployed base URL for smoke runs"
        required: false
        type: string
      suite:
        description: "Suite to run: smoke or gate"
        required: false
        default: "smoke"
        type: string

jobs:
  smoke:
    name: Playwright smoke
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: orchestrator
    env:
      PLAYWRIGHT_BASE_URL: ${{ inputs.base_url || 'http://127.0.0.1:3000' }}
      E2E_SUITE: ${{ inputs.suite || 'smoke' }}
      E2E_TEST_EMAIL: ${{ secrets.E2E_TEST_EMAIL }}
      E2E_TEST_PASSWORD: ${{ secrets.E2E_TEST_PASSWORD }}
      E2E_WORKSPACE_ID: ${{ secrets.E2E_WORKSPACE_ID }}
      NEXT_TELEMETRY_DISABLED: 1

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: orchestrator/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Preflight smoke secrets
        run: |
          missing=0
          for key in E2E_TEST_EMAIL E2E_TEST_PASSWORD E2E_WORKSPACE_ID; do
            if [ -z "${!key}" ]; then
              echo "::error title=Missing required secret::$key is required for the Elmer smoke gate."
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            echo "Smoke gate requires E2E_TEST_EMAIL, E2E_TEST_PASSWORD, and E2E_WORKSPACE_ID."
            exit 1
          fi

      - name: Start local app
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.base_url == '' }}
        run: |
          npm run dev > /tmp/elmer-smoke.log 2>&1 &
          for attempt in $(seq 1 60); do
            if curl -sf http://127.0.0.1:3000/ >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          cat /tmp/elmer-smoke.log
          exit 1

      - name: Run Playwright suite
        run: |
          if [ "$E2E_SUITE" = "gate" ]; then
            npm run test:e2e:gate -- --project=chromium
          else
            npm run test:e2e:smoke -- --project=chromium
          fi

      - name: Smoke workflow summary
        if: always()
        run: |
          {
            echo "## Elmer smoke gate"
            echo
            echo "- Suite: ${E2E_SUITE}"
            echo "- Browser: Chromium only"
            echo "- Mode: $([ -n \"${{ inputs.base_url }}\" ] && echo "deployed smoke" || echo "local app smoke")"
            echo "- Required secrets: E2E_TEST_EMAIL, E2E_TEST_PASSWORD, E2E_WORKSPACE_ID"
            echo "- Common blocker: auth or public environment instability will usually fail before route assertions."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-smoke-report
          path: orchestrator/playwright-report
          retention-days: 7
