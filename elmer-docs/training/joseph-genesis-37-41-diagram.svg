<svg xmlns="http://www.w3.org/2000/svg" width="2200" height="1600" viewBox="0 0 2200 1600" role="img" aria-labelledby="title desc">
  <title id="title">Joseph's Journey: Genesis 37-41</title>
  <desc id="desc">Colorful teaching diagram for a 12-year-old Sunday School class covering Joseph in Genesis 37 through 41, including scriptures, themes, and lesson highlights.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fbff" />
      <stop offset="100%" stop-color="#eef8f1" />
    </linearGradient>
    <linearGradient id="titleGlow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2563eb" />
      <stop offset="50%" stop-color="#7c3aed" />
      <stop offset="100%" stop-color="#f59e0b" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#0f172a" flood-opacity="0.12" />
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="10" markerHeight="10" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569" />
    </marker>
    <style>
      .title { font: 800 52px Arial, sans-serif; fill: #0f172a; }
      .subtitle { font: 500 24px Arial, sans-serif; fill: #334155; }
      .section { font: 800 30px Arial, sans-serif; fill: #0f172a; }
      .card-title { font: 800 24px Arial, sans-serif; fill: #0f172a; }
      .card-body { font: 500 20px Arial, sans-serif; fill: #1e293b; }
      .small { font: 700 18px Arial, sans-serif; fill: #334155; }
      .pill { font: 800 24px Arial, sans-serif; fill: white; }
      .bubble { font: 700 22px Arial, sans-serif; fill: #0f172a; }
      .scripture { font: 700 18px Arial, sans-serif; fill: #1d4ed8; }
      .learn { font: 700 18px Arial, sans-serif; fill: #7c2d12; }
      .arrow-label { font: 700 18px Arial, sans-serif; fill: #475569; }
    </style>
  </defs>

  <rect width="2200" height="1600" fill="url(#bg)" />
  <rect x="50" y="40" width="2100" height="1500" rx="36" fill="#ffffff" stroke="#dbeafe" stroke-width="3" filter="url(#shadow)" />

  <rect x="160" y="80" width="1880" height="90" rx="45" fill="url(#titleGlow)" opacity="0.14" />
  <text x="1100" y="125" text-anchor="middle" class="title">Joseph's Journey: Genesis 37-41</text>
  <text x="1100" y="160" text-anchor="middle" class="subtitle">Come, Follow Me 2026 week 11 " story, scriptures, and teachings for a 12-year-old class</text>

  <rect x="160" y="210" width="520" height="110" rx="28" fill="#2563eb" filter="url(#shadow)" />
  <text x="420" y="252" text-anchor="middle" class="pill">Main truth</text>
  <text x="420" y="287" text-anchor="middle" class="pill">The Lord was with Joseph</text>
  <text x="420" y="310" text-anchor="middle" style="font:700 17px Arial, sans-serif; fill:#dbeafe;">Genesis 39:2, 21, 23</text>

  <rect x="740" y="205" width="760" height="120" rx="34" fill="#fde68a" stroke="#f59e0b" stroke-width="3" filter="url(#shadow)" />
  <text x="1120" y="248" text-anchor="middle" class="bubble">Hardship did not mean God had left Joseph.</text>
  <text x="1120" y="280" text-anchor="middle" class="bubble">The Lord kept guiding, strengthening, and preparing him.</text>

  <rect x="1560" y="210" width="480" height="110" rx="28" fill="#ede9fe" stroke="#8b5cf6" stroke-width="3" filter="url(#shadow)" />
  <text x="1800" y="252" text-anchor="middle" class="small">Official guide anchors</text>
  <text x="1800" y="282" text-anchor="middle" class="small">Come, Follow Me " Seminary " Institute " Scripture Helps</text>

  <rect x="120" y="370" width="1960" height="410" rx="30" fill="#eff6ff" stroke="#93c5fd" stroke-width="3" />
  <text x="170" y="420" class="section">Story journey</text>

  <rect x="145" y="465" width="280" height="250" rx="28" fill="#bfdbfe" stroke="#2563eb" stroke-width="3" filter="url(#shadow)" />
  <text x="285" y="505" text-anchor="middle" class="card-title">1. Beloved son</text>
  <text x="285" y="535" text-anchor="middle" class="card-title">and inspired dreams</text>
  <text x="285" y="565" text-anchor="middle" class="scripture">Genesis 37:3-11</text>
  <text x="285" y="600" text-anchor="middle" class="card-body">Jacob gives Joseph</text>
  <text x="285" y="626" text-anchor="middle" class="card-body">a special coat.</text>
  <text x="285" y="652" text-anchor="middle" class="card-body">Joseph shares</text>
  <text x="285" y="678" text-anchor="middle" class="card-body">two inspired dreams.</text>
  <text x="285" y="705" text-anchor="middle" class="learn">Learn: God can reveal truth.</text>

  <rect x="475" y="465" width="280" height="250" rx="28" fill="#fed7aa" stroke="#f97316" stroke-width="3" filter="url(#shadow)" />
  <text x="615" y="505" text-anchor="middle" class="card-title">2. Pit and slavery</text>
  <text x="615" y="535" text-anchor="middle" class="scripture">Genesis 37:18-28, 36</text>
  <text x="615" y="575" text-anchor="middle" class="card-body">Joseph's brothers</text>
  <text x="615" y="601" text-anchor="middle" class="card-body">throw him into a pit</text>
  <text x="615" y="627" text-anchor="middle" class="card-body">and sell him</text>
  <text x="615" y="653" text-anchor="middle" class="card-body">into Egypt.</text>
  <text x="615" y="690" text-anchor="middle" class="learn">Learn: God still sees us.</text>

  <rect x="805" y="465" width="280" height="250" rx="28" fill="#bbf7d0" stroke="#16a34a" stroke-width="3" filter="url(#shadow)" />
  <text x="945" y="505" text-anchor="middle" class="card-title">3. Blessed in</text>
  <text x="945" y="535" text-anchor="middle" class="card-title">Potiphar's house</text>
  <text x="945" y="565" text-anchor="middle" class="scripture">Genesis 39:1-6</text>
  <text x="945" y="600" text-anchor="middle" class="card-body">Joseph serves with</text>
  <text x="945" y="626" text-anchor="middle" class="card-body">faith and integrity.</text>
  <text x="945" y="652" text-anchor="middle" class="card-body">The Lord helps him</text>
  <text x="945" y="678" text-anchor="middle" class="card-body">prosper.</text>
  <text x="945" y="705" text-anchor="middle" class="learn">Learn: God helps in unfair places.</text>

  <rect x="1135" y="465" width="280" height="250" rx="28" fill="#fecaca" stroke="#dc2626" stroke-width="3" filter="url(#shadow)" />
  <text x="1275" y="505" text-anchor="middle" class="card-title">4. Prison, but</text>
  <text x="1275" y="535" text-anchor="middle" class="card-title">not alone</text>
  <text x="1275" y="565" text-anchor="middle" class="scripture">Genesis 39:20-23</text>
  <text x="1275" y="600" text-anchor="middle" class="card-body">Joseph is falsely</text>
  <text x="1275" y="626" text-anchor="middle" class="card-body">accused and sent</text>
  <text x="1275" y="652" text-anchor="middle" class="card-body">to prison.</text>
  <text x="1275" y="678" text-anchor="middle" class="card-body">The Lord is still</text>
  <text x="1275" y="704" text-anchor="middle" class="card-body">with him there.</text>

  <rect x="1465" y="465" width="280" height="250" rx="28" fill="#ddd6fe" stroke="#7c3aed" stroke-width="3" filter="url(#shadow)" />
  <text x="1605" y="505" text-anchor="middle" class="card-title">5. Dreams in prison</text>
  <text x="1605" y="535" text-anchor="middle" class="scripture">Genesis 40:5-23</text>
  <text x="1605" y="575" text-anchor="middle" class="card-body">Joseph listens and says</text>
  <text x="1605" y="601" text-anchor="middle" class="card-body">interpretations</text>
  <text x="1605" y="627" text-anchor="middle" class="card-body">belong to God.</text>
  <text x="1605" y="653" text-anchor="middle" class="card-body">He helps the butler</text>
  <text x="1605" y="679" text-anchor="middle" class="card-body">and baker.</text>
  <text x="1605" y="705" text-anchor="middle" class="learn">Learn: Revelation points to God.</text>

  <rect x="1795" y="465" width="260" height="250" rx="28" fill="#dcfce7" stroke="#22c55e" stroke-width="3" filter="url(#shadow)" />
  <text x="1925" y="505" text-anchor="middle" class="card-title">6. Pharaoh's dreams</text>
  <text x="1925" y="535" text-anchor="middle" class="card-title">and preparation</text>
  <text x="1925" y="565" text-anchor="middle" class="scripture">Genesis 41:14-43, 53-57</text>
  <text x="1925" y="600" text-anchor="middle" class="card-body">7 years of plenty,</text>
  <text x="1925" y="626" text-anchor="middle" class="card-body">7 years of famine.</text>
  <text x="1925" y="652" text-anchor="middle" class="card-body">Joseph prepares Egypt</text>
  <text x="1925" y="678" text-anchor="middle" class="card-body">to save many lives.</text>
  <text x="1925" y="705" text-anchor="middle" class="learn">Learn: Preparation blesses many.</text>

  <line x1="425" y1="590" x2="475" y2="590" stroke="#64748b" stroke-width="4" marker-end="url(#arrow)" />
  <line x1="755" y1="590" x2="805" y2="590" stroke="#64748b" stroke-width="4" marker-end="url(#arrow)" />
  <line x1="1085" y1="590" x2="1135" y2="590" stroke="#64748b" stroke-width="4" marker-end="url(#arrow)" />
  <line x1="1415" y1="590" x2="1465" y2="590" stroke="#64748b" stroke-width="4" marker-end="url(#arrow)" />
  <line x1="1745" y1="590" x2="1795" y2="590" stroke="#64748b" stroke-width="4" marker-end="url(#arrow)" />

  <text x="450" y="575" text-anchor="middle" class="arrow-label">jealousy</text>
  <text x="780" y="575" text-anchor="middle" class="arrow-label">Egypt</text>
  <text x="1110" y="575" text-anchor="middle" class="arrow-label">tested</text>
  <text x="1440" y="575" text-anchor="middle" class="arrow-label">gift</text>
  <text x="1770" y="575" text-anchor="middle" class="arrow-label">prepared</text>

  <rect x="120" y="835" width="1960" height="300" rx="30" fill="#f0fdf4" stroke="#86efac" stroke-width="3" />
  <text x="170" y="885" class="section">Big teachings</text>

  <circle cx="300" cy="935" r="48" fill="#16a34a" />
  <text x="300" y="944" text-anchor="middle" class="pill" style="font-size:22px;">Trust</text>
  <rect x="150" y="985" width="500" height="115" rx="28" fill="#bbf7d0" stroke="#16a34a" stroke-width="3" filter="url(#shadow)" />
  <text x="400" y="1023" text-anchor="middle" class="card-title">The Lord is with us in hardship</text>
  <text x="400" y="1052" text-anchor="middle" class="scripture">Genesis 39:2, 21, 23</text>
  <text x="400" y="1080" text-anchor="middle" class="card-body">Share your two personal stories here.</text>

  <circle cx="1100" cy="935" r="48" fill="#7c3aed" />
  <text x="1100" y="944" text-anchor="middle" class="pill" style="font-size:22px;">Listen</text>
  <rect x="850" y="985" width="500" height="115" rx="28" fill="#ddd6fe" stroke="#7c3aed" stroke-width="3" filter="url(#shadow)" />
  <text x="1100" y="1023" text-anchor="middle" class="card-title">God gives revelation</text>
  <text x="1100" y="1052" text-anchor="middle" class="scripture">Genesis 37:5-11; 40:8; 41:16, 25, 38</text>
  <text x="1100" y="1080" text-anchor="middle" class="card-body">Use your prepared guess the dreams game here.</text>

  <circle cx="1900" cy="935" r="48" fill="#f59e0b" />
  <text x="1900" y="944" text-anchor="middle" class="pill" style="font-size:22px;">Prepare</text>
  <rect x="1550" y="985" width="500" height="115" rx="28" fill="#fde68a" stroke="#f59e0b" stroke-width="3" filter="url(#shadow)" />
  <text x="1800" y="1023" text-anchor="middle" class="card-title">Preparation brings peace</text>
  <text x="1800" y="1052" text-anchor="middle" class="scripture">Genesis 41:33-36, 53-57 " Doctrine and Covenants 38:30</text>
  <text x="1800" y="1080" text-anchor="middle" class="card-body">If we are prepared, we need not fear.</text>

  <rect x="120" y="1185" width="1960" height="290" rx="30" fill="#faf5ff" stroke="#c4b5fd" stroke-width="3" />
  <text x="170" y="1235" class="section">Teaching helps and study guide anchors</text>

  <rect x="150" y="1285" width="560" height="150" rx="28" fill="#e0f2fe" stroke="#38bdf8" stroke-width="3" filter="url(#shadow)" />
  <text x="430" y="1323" text-anchor="middle" class="card-title">Joseph points to Jesus Christ</text>
  <text x="430" y="1355" text-anchor="middle" class="card-body">Scripture Helps: beloved son, betrayed,</text>
  <text x="430" y="1381" text-anchor="middle" class="card-body">faithful in suffering. Keep this simple.</text>

  <rect x="820" y="1285" width="620" height="150" rx="28" fill="#fef3c7" stroke="#f59e0b" stroke-width="3" filter="url(#shadow)" />
  <text x="1130" y="1323" text-anchor="middle" class="card-title">Official Church study guides</text>
  <text x="1130" y="1355" text-anchor="middle" class="card-body">Come, Follow Me 2026 " Seminary Manual 2026</text>
  <text x="1130" y="1381" text-anchor="middle" class="card-body">Institute Manual 2026 " Scripture Helps " Games and Activities</text>

  <rect x="1550" y="1285" width="500" height="150" rx="28" fill="#dbeafe" stroke="#2563eb" stroke-width="3" filter="url(#shadow)" />
  <text x="1800" y="1323" text-anchor="middle" class="card-title">Class reminder</text>
  <text x="1800" y="1355" text-anchor="middle" class="card-body">Skip the detailed temptation section.</text>
  <text x="1800" y="1381" text-anchor="middle" class="card-body">Focus on hardship, revelation, and preparation.</text>

  <text x="1100" y="1510" text-anchor="middle" class="subtitle">One-sentence takeaway: Because the Lord was with Joseph in every stage of his journey, He can help us too.</text>
</svg>
